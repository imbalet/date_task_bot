name: CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      full_image: ${{ steps.full-image.outputs.full_image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=ref,event=branch

      - name: Set full image with SHA
        id: full-image
        run: |
          SHA_TAG=$(echo "${{ steps.meta.outputs['tag-names'] }}" | tr ',' '\n' | grep '^sha-' | head -n1)

          if [ -z "$SHA_TAG" ]; then
            SHA_TAG=$(git rev-parse --short HEAD)
            SHA_TAG="sha-$SHA_TAG"
          fi

          echo "full_image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHA_TAG}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.19.2
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy deployment files via SCP
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,deploy.sh"
          target: "~/app"

      - name: Deploy application
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ needs.build.outputs.full_image }}" 
            export XDG_RUNTIME_DIR=/run/user/$(id -u)
            export DOCKER_HOST=unix://$XDG_RUNTIME_DIR/docker.sock
            cd ~/app 
            chmod +x deploy.sh 
            ./deploy.sh ${{ needs.build.outputs.full_image }}
