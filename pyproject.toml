[project]
name = "date-task-bot"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "aiogram>=3.22.0",
    "aiosqlite>=0.21.0",
    "alembic>=1.17.1",
    "dateparser>=1.2.2",
    "pydantic>=2.11.10",
    "pydantic-settings>=2.11.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[build-system]
requires = ["setuptools>=42"]
build-backend = "setuptools.build_meta"
